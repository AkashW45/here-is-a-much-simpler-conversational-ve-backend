<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random 10 KB Text Generator</title>
    <style>
        .hidden { display: none; }
        .loading { margin: 1rem 0; font-style: italic; color: #555; }
        .container { max-width: 600px; margin: 2rem auto; text-align: center; }
        button, .download-btn { padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; }
        .download-btn { display: inline-block; background: #4CAF50; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Random 10 KB Text Generator</h1>
        <button id="generateBtn">Generate Random Text</button>
        <div id="loading" class="loading hidden">Generating...</div>
        <a id="downloadBtn" class="download-btn hidden" download="random.txt">Download File</a>
    </div>
    <script>
        (function() {
            const generateBtn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const downloadBtn = document.getElementById('downloadBtn');

            generateBtn.addEventListener('click', async () => {
                loading.classList.remove('hidden');
                downloadBtn.classList.add('hidden');
                try {
                    const response = await fetch('/generate');
                    if (!response.ok) throw new Error('Network response was not ok');
                    const text = await response.text();
                    const blob = new Blob([text], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    downloadBtn.href = url;
                    downloadBtn.classList.remove('hidden');
                } catch (error) {
                    alert('Error generating text: ' + error.message);
                } finally {
                    loading.classList.add('hidden');
                }
            });
        })();
    </script>
</body>
</html>
